services:
  zotero-mcp:
    image: ghcr.io/endofthestars/zotero-mcp:0.6.1
    container_name: zotero-mcp
    restart: unless-stopped
    init: true
    entrypoint:
      - zotero-mcp
      - serve
      - --transport
      - streamable-http
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "${ZOTERO_MCP_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      ZOTERO_LOCAL: "${ZOTERO_LOCAL:-false}"
      ZOTERO_LIBRARY_TYPE: "${ZOTERO_LIBRARY_TYPE:-user}"
      ZOTERO_MCP_LOG_LEVEL: "${ZOTERO_MCP_LOG_LEVEL:-INFO}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - zotero_mcp_config:/home/app/.config/zotero-mcp
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; s = socket.create_connection(('127.0.0.1', 8000), 3); s.close()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  zotero_mcp_config:
